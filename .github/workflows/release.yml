name: Release
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # To push git tags and create GitHub releases
      issues: write        # To comment on released issues
      pull-requests: write # To comment on released PRs
      id-token: write      # REQUIRED for npm Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22  # npm Trusted Publishing requires Node >= 22.14.0
          cache: 'pnpm'

      - name: Upgrade npm
        run: npm install -g npm@latest  # npm Trusted Publishing requires npm >= 11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
